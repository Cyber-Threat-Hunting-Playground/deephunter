{% extends "base.html" %}

{% block style %}
<link rel="stylesheet" type="text/css" href="/static/css/list_analytics.css" />
<link rel="stylesheet" href="/static/jquery-ui/jquery-ui.min.css" />
<link rel="stylesheet" href="/static/css/tabs.css" />
<link rel="stylesheet" href="/static/css/connectors_conf.css" />
{% endblock %}

{% block js %}
<script src="/static/jquery-ui/jquery-ui.min.js"></script>
{% endblock %}

{% block body %}

<div id="tabs_config">

    <div id="permissions"></div>
    <div id="app_settings"></div>
    <div id="connectors"></div>
    <div id="catalog"></div>
    <div id="api_keys"></div>

<script type="text/javascript" nonce="jg6kl5z3v2">

{% endblock %}
