name: Security dependency update (pip-audit)

on:
  # Manual execution from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual execution"
        required: false
        default: "Manual security audit"

  # Weekly scheduled execution
  schedule:
    - cron: "0 3 * * 1" # Monday at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pip-tools jq

      # ---------------------------------
      # 1️⃣ Run pip-audit
      # ---------------------------------
      - name: Run pip-audit
        id: audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format json > audit.json

      - name: Check for vulnerabilities
        id: vulncheck
        run: |
          COUNT=$(jq length audit.json)
          echo "vuln_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No vulnerabilities found"
            exit 0
          fi

      # ---------------------------------
      # 2️⃣ Upgrade vulnerable packages
      # ---------------------------------
      - name: Upgrade vulnerable dependencies
        if: steps.vulncheck.outputs.vuln_count != '0'
        run: |
          jq -r '.[].name' audit.json | sort -u > vulnerable.txt
          xargs -a vulnerable.txt pip install --upgrade
          pip freeze > requirements.txt

      # ---------------------------------
      # 3️⃣ Create Pull Request
      # ---------------------------------
      - name: Create security pull request
        if: steps.vulncheck.outputs.vuln_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: security/pip-audit-fixes
          delete-branch: true
          title: "Security: fix CVEs detected by pip-audit"
          commit-message: "security(deps): upgrade vulnerable Python dependencies"
          body: |
            ## 🔒 Security audit results

            This pull request was **automatically generated** by `pip-audit`.

            **Trigger:** `${{ github.event_name }}`
            **Reason:** `${{ inputs.reason || 'Scheduled security scan' }}`

            ✅ Known CVEs detected during CI were addressed  
            ✅ Dependency upgrades remain non‑breaking

            Please review and merge.

          labels: |
            security
            dependencies
