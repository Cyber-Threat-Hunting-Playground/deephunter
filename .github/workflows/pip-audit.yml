# Scan pinned dependencies in requirements.txt for known CVEs (pip-audit).
# Runs on changes to requirements, weekly, and on demand.
name: pip-audit

on:
  push:
    branches: [main, master]
    paths:
      - 'requirements.txt'
      - '.github/workflows/pip-audit.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'requirements.txt'
      - '.github/workflows/pip-audit.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pip-audit and scan requirements
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt
