name: Security Audit

on:
  # Manual execution from GitHub UI
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual execution"
        required: false
        default: "Manual security audit"

  # Weekly scheduled execution
  schedule:
    - cron: "0 3 * * 1" # Monday at 03:00 UTC

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pip-tools jq

      # --------------------------------------------------
      # 1️⃣ Run pip-audit
      # --------------------------------------------------
      - name: Run pip-audit
        id: audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format json > audit.json

      - name: Check for vulnerabilities
        id: vulncheck
        run: |
          COUNT=$(jq length audit.json)
          echo "vuln_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [ "$COUNT" -eq 0 ]; then
            echo "✅ No vulnerabilities found"
            exit 0
