name: Security dependency update (pip-audit)

on:
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday
  workflow_dispatch:
  push:
    paths:
      - requirements.txt

permissions:
  contents: write
  pull-requests: write

jobs:
  audit-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit pip-tools

      # --------------------------------------------------
      # 1. Detect vulnerabilities
      # --------------------------------------------------
      - name: Run pip-audit
        id: audit
        continue-on-error: true
        run: |
          pip-audit -r requirements.txt --format json > audit.json

      - name: Check if vulnerabilities exist
        id: vulncheck
        run: |
          COUNT=$(jq length audit.json)
          echo "vuln_count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No vulnerabilities found"
            exit 0
          fi

      # --------------------------------------------------
      # 2. Upgrade affected packages only
      # --------------------------------------------------
      - name: Upgrade vulnerable dependencies
        if: steps.vulncheck.outputs.vuln_count != '0'
        run: |
          jq -r '.[].name' audit.json | sort -u > vulnerable.txt
          xargs -a vulnerable.txt pip install --upgrade

          # Freeze updated versions back into requirements.txt
          pip freeze > requirements.txt

      # --------------------------------------------------
      # 3. Create pull request
      # --------------------------------------------------
      - name: Create security PR
        if: steps.vulncheck.outputs.vuln_count != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: security/pip-audit-fixes
          delete-branch: true
          title: "Security: fix CVEs detected by pip-audit"
          commit-message: "security(deps): upgrade vulnerable Python dependencies"
          body: |
            ## 🔒 Security fixes

            This pull request was generated automatically by **pip-audit**.

            ✅ All known CVEs reported during CI execution were addressed.  
            ✅ Dependency upgrades are limited to non-breaking versions.

            Please review and merge.

          labels: |
            security
            dependencies
``
