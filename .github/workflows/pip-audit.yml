name: pip Dependency Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: write
  pull-requests: write

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install "pip-audit>=2.10.0" jq

      # ------------------------------------------------
      # 1. Scan (JSON only – never fail CI)
      # ------------------------------------------------
      - name: Run pip-audit (JSON)
        run: |
          pip-audit -r requirements.txt \
            --format json \
            --output audit.json || true

      # ------------------------------------------------
      # 2. Convert pip-audit JSON → SARIF
      # ------------------------------------------------
      - name: Convert pip-audit JSON to SARIF
        run: |
          jq -n \
            --argjson findings "$(cat audit.json)" '
          {
            version: "2.1.0",
            runs: [{
              tool: {
                driver: {
                  name: "pip-audit",
                  informationUri: "https://github.com/pypa/pip-audit",
                  rules: (
                    $findings
                    | map(.id)
                    | unique
                    | map({
                        id: .,
                        shortDescription: { text: . }
                      })
                  )
                }
              },
              results: (
                $findings
                | map({
                    ruleId: .id,
                    level: "error",
                    message: {
                      text: (
                        .name + " " + .version +
                        " – " + .id +
                        (
                          if (.fix_versions | length) > 0
                          then " (fix: " + (.fix_versions | join(", ")) + ")"
                          else ""
                          end
                        )
                      )
                    },
                    locations: [{
                      physicalLocation: {
                        artifactLocation: {
                          uri: "requirements.txt"
                        }
                      }
                    }]
                })
              )
            }]
          }' > pip-audit.sarif

      - name: Upload results to GitHub Advanced Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: pip-audit.sarif
          category: dependency-security

      # ------------------------------------------------
      # 3. Apply deterministic fixes
      # ------------------------------------------------
      - name: Apply fix versions
        id: fixes
        run: |
          FIXABLE=$(jq '
            [.[] | select(.fix_versions | length > 0)] | length
          ' audit.json)

          echo "fixable=$FIXABLE" >> "$GITHUB_OUTPUT"

          if [ "$FIXABLE" -eq 0 ]; then
            echo "No fixable vulnerabilities found"
            exit 0
          fi

          cp requirements.txt requirements.txt.bak

          jq -r '
            .[] |
            select(.fix_versions | length > 0) |
            "\(.name)==\(.fix_versions[-1])"
          ' audit.json | while read pinned; do
            pkg="${pinned%%==*}"
            sed -i "s|^$pkg.*|$pinned|" requirements.txt
          done

          echo "==== Dependency diff ===="
          git diff

      # ------------------------------------------------
      # 4. Create PR (ONLY if there is a diff)
      # ------------------------------------------------
      - name: Create remediation PR
        if: steps.fixes.outputs.fixable != '0'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: security/pip-audit-fixes
          delete-branch: true
          title: "Security: fix dependency CVEs"
          commit-message: "security(deps): pin fixed versions from pip-audit"
          body: |
            ## 🔒 Dependency Security Fix

            This pull request was generated automatically and is aligned with
            **GitHub Advanced Security**.

            ✅ CVEs detected via `pip-audit`
            ✅ Alerts uploaded as SARIF
            ✅ Dependencies pinned to vendor‑recommended fixed versions
            ✅ No CI failures during detection or remediation

            Please review and merge.
          labels: |
            security
            dependencies
